<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUPV AIMS | Secure Access</title>
    <style>
        :root { --tup-red: #800000; --bg: #f8f0f0; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); }
        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: var(--tup-red); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: white; padding: 40px; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-prime { background: var(--tup-red); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-prime:hover { background: #600000; }
        #app { padding: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="login-box">
            <h2 style="color:var(--tup-red); margin-top:0;">TUPV AIMS</h2>
            <p style="font-size: 0.8rem; color: #666;">Enter Credentials</p>
            <input type="text" id="uIn" placeholder="Username (TUPV)">
            <input type="password" id="pIn" placeholder="Password (MXE 1-A)">
            <button type="button" class="btn-prime" onclick="handleLoginAttempt()">LOGIN</button>
            <p id="err-msg" style="color: red; font-size: 0.8rem; margin-top: 10px;" class="hidden">Invalid Credentials</p>
        </div>
    </div>

    <div id="app" class="hidden">
        <h1 style="color:var(--tup-red)">Welcome to AIMS Portal</h1>
        <p>If you see this, the login worked!</p>
        <button class="btn-prime" style="width: 200px;" onclick="location.reload()">LOGOUT</button>
        <hr>
        <div id="main-content">
            <p>Ready to manage records.</p>
        </div>
    </div>

    <script>
        // 1. Connection Check: This runs as soon as the page loads
        console.log("System Online: Ready for login.");

        function handleLoginAttempt() {
            console.log("Login button clicked!"); // If you don't see this in F12 console, the button is broken.

            const userField = document.getElementById('uIn');
            const passField = document.getElementById('pIn');
            const errMsg = document.getElementById('err-msg');

            const username = userField.value.trim().toUpperCase();
            const password = passField.value.trim().toUpperCase();

            // Simplified check
            if (username === "TUPV" && password === "MXE 1-A") {
                console.log("Access Granted");
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else {
                console.log("Access Denied");
                errMsg.classList.remove('hidden');
                userField.style.borderColor = "red";
                passField.style.borderColor = "red";
            }
        }

        // Support for "Enter" key
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLoginAttempt();
            }
        });
    </script>
</body>
</html>
